<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Messages - ExamPro</title>
<link rel="stylesheet" href="/css/main.css">
<style>
.chat-layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 60px);overflow:hidden}
.chat-sidebar{border-right:1px solid var(--border);overflow-y:auto;background:var(--bg-card)}
.chat-sidebar-header{padding:16px;font-weight:700;font-size:1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.chat-room-item{padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .2s}
.chat-room-item:hover,.chat-room-item.active{background:rgba(91,125,255,.1)}
.chat-room-name{font-weight:600;font-size:.95rem}
.chat-room-preview{font-size:.8rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.chat-main{display:flex;flex-direction:column;height:100%}
.chat-header{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--bg-card);font-weight:700;font-size:1rem}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px}
.msg{display:flex;gap:8px;align-items:flex-end}
.msg.me{flex-direction:row-reverse}
.msg-bubble{padding:10px 14px;border-radius:14px;max-width:60%;font-size:.9rem;word-break:break-word}
.msg .msg-bubble{background:var(--bg-card);border:1px solid var(--border)}
.msg.me .msg-bubble{background:var(--primary);color:#fff}
.msg-time{font-size:.7rem;opacity:.5;margin-top:2px}
.chat-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--bg-card)}
.unread-badge{background:#e74c3c;color:#fff;font-size:.7rem;padding:1px 7px;border-radius:99px;margin-left:6px}
.chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted)}
.new-chat-btn{background:var(--primary);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:.78rem;cursor:pointer}
.contacts-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center}
.contacts-inner{background:var(--bg-card);border-radius:14px;padding:24px;width:360px;max-height:500px;overflow-y:auto}
</style>
</head>
<body>
<nav class="navbar" style="height:60px;display:flex;align-items:center;padding:0 24px;justify-content:space-between;background:var(--bg-card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100">
  <a href="/" class="nav-logo" style="font-weight:800;font-size:1.1rem">ExamPro</a>
  <div style="display:flex;gap:12px">
    <a href="/dashboard" class="btn btn-outline btn-sm">← Dashboard</a>
  </div>
</nav>
<div class="chat-layout">
  <div class="chat-sidebar">
    <div class="chat-sidebar-header">
      Messages
      <button class="new-chat-btn" onclick="showNewChatModal()">+ New</button>
    </div>
    <div id="rooms-list"><div style="padding:16px;color:var(--text-muted)">Loading...</div></div>
  </div>
  <div class="chat-main">
    <div class="chat-header" id="chat-header">Select a conversation</div>
    <div class="chat-messages" id="chat-messages">
      <div class="chat-empty">
        <div style="font-size:3rem;margin-bottom:12px">💬</div>
        <div>Select a conversation to start messaging</div>
      </div>
    </div>
    <div class="chat-footer" id="chat-footer" style="display:none">
      <input class="form-control" id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="btn btn-primary" onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<div class="contacts-modal" id="contacts-modal" style="display:none">
  <div class="contacts-inner">
    <div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <strong>New Conversation</strong>
      <span style="cursor:pointer" onclick="document.getElementById('contacts-modal').style.display='none'">✕</span>
    </div>
    <div id="contacts-list"><div class="spinner"></div></div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
if(!protectRoute(false)) throw new Error('Auth');
let currentRoom = null;
let pollInterval = null;

async function loadRooms() {
  const data = await http.get('/chat/rooms').catch(() => null);
  const el = document.getElementById('rooms-list');
  const rooms = Array.isArray(data) ? data : (data?.rooms || []);
  if (!rooms.length) {
    el.innerHTML = '<div style="padding:16px;color:var(--text-muted);text-align:center">No conversations yet.<br><br><button class="btn btn-primary btn-sm" onclick="showNewChatModal()">Start a conversation</button></div>';
    return;
  }
  el.innerHTML = rooms.map(function(r) {
    var name = r.other_name || r.name || 'Unknown';
    var unread = r.unread_count > 0 ? '<span class="unread-badge">' + r.unread_count + '</span>' : '';
    return '<div class="chat-room-item' + (currentRoom === r.id ? ' active' : '') + '" onclick="openRoom(' + r.id + ',\'' + name.replace(/'/g, "\\'") + '\')">' +
      '<div class="chat-room-name">' + name + unread + '</div>' +
      '<div class="chat-room-preview">' + (r.last_message || 'No messages yet') + '</div></div>';
  }).join('');
}

async function openRoom(roomId, name) {
  currentRoom = roomId;
  document.getElementById('chat-header').textContent = name;
  document.getElementById('chat-footer').style.display = 'flex';
  if (pollInterval) clearInterval(pollInterval);
  await loadMessages();
  pollInterval = setInterval(loadMessages, 5000);
  loadRooms();
}

async function loadMessages() {
  if (!currentRoom) return;
  const data = await http.get('/chat/rooms/' + currentRoom + '/messages').catch(() => null);
  const area = document.getElementById('chat-messages');
  const myId = Auth.getUser()?.id;
  const msgs = Array.isArray(data) ? data : (data?.messages || []);
  if (!msgs.length) {
    area.innerHTML = '<div class="chat-empty"><div>No messages yet. Say hello! \u{1F44B}</div></div>';
    return;
  }
  var wasAtBottom = area.scrollHeight - area.scrollTop <= area.clientHeight + 5;
  area.innerHTML = msgs.map(function(m) {
    var isMe = m.sender_id === myId;
    return '<div class="msg' + (isMe ? ' me' : '') + '">' +
      '<div class="msg-bubble">' + escapeHtml(m.message || m.message_text || '') +
      '<div class="msg-time">' + new Date(m.created_at).toLocaleTimeString() + '</div></div></div>';
  }).join('');
  if (wasAtBottom) area.scrollTop = area.scrollHeight;
}

async function sendMsg() {
  var inp = document.getElementById('msg-input');
  var msg = inp.value.trim();
  if (!msg || !currentRoom) return;
  inp.value = '';
  await http.post('/chat/rooms/' + currentRoom + '/messages', {message: msg});
  loadMessages();
}

function escapeHtml(t) {
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(t || ''));
  return d.innerHTML;
}

async function showNewChatModal() {
  document.getElementById('contacts-modal').style.display = 'flex';
  document.getElementById('contacts-list').innerHTML = '<div style="text-align:center;padding:20px;"><div class="spinner"></div></div>';
  var data = await http.get('/chat/contacts').catch(() => null);
  var el = document.getElementById('contacts-list');
  var contacts = data?.contacts || [];
  if (!contacts.length) {
    el.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:16px">No contacts available</p>';
    return;
  }
  el.innerHTML = contacts.map(function(c) {
    var role = c.role_id === 1 ? 'Student' : c.role_id === 2 ? 'Admin' : 'Instructor';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">' +
      '<div><div style="font-weight:600">' + c.name + '</div>' +
      '<div style="font-size:.8rem;color:var(--text-muted)">' + role + '</div></div>' +
      '<button class="btn btn-primary btn-sm" onclick="startChat(' + c.id + ',\'' + c.name.replace(/'/g, "\\'") + '\')">Chat</button></div>';
  }).join('');
}

async function startChat(userId, name) {
  document.getElementById('contacts-modal').style.display = 'none';
  var r = await http.post('/chat/rooms', {other_user_id: userId});
  var room = r?.id ? r : r?.room;
  if (room) { openRoom(room.id, name); loadRooms(); }
}

loadRooms();
</script>
<script>
// Role-aware dashboard links
(function fixDashLinks() {
  if (typeof Auth === 'undefined') { setTimeout(fixDashLinks, 80); return; }
  var url = Auth.getDashboardUrl ? Auth.getDashboardUrl() : '/dashboard';
  document.querySelectorAll('a[href="/dashboard"]').forEach(function(a) { a.href = url; });
})();
</script>
</body>
</html>
