<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Template Preview — ExamPro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',system-ui,sans-serif;background:#060614;color:#fff;min-height:100vh;}

.prev-nav{
  position:fixed;top:0;left:0;right:0;z-index:9999;
  background:rgba(6,6,20,0.9);backdrop-filter:blur(20px);
  padding:11px 24px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.prev-left{display:flex;align-items:center;gap:12px;}
.btn-back{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.75);padding:7px 14px;border-radius:8px;
  cursor:pointer;font-size:.8rem;font-weight:600;transition:all .15s;
  display:flex;align-items:center;gap:6px;
}
.btn-back:hover{background:rgba(255,255,255,.12);color:#fff;}
.prev-title{font-weight:800;font-size:.95rem;color:#fff;}
.prev-badge{
  background:rgba(91,125,255,.18);color:#818CF8;
  border:1px solid rgba(91,125,255,.3);
  padding:3px 11px;border-radius:99px;font-size:.68rem;font-weight:800;letter-spacing:.5px;
  display:flex;align-items:center;gap:5px;
}
.prev-right{display:flex;align-items:center;gap:12px;}
.prev-price{font-weight:900;font-size:1.05rem;color:#fff;}
.prev-free{font-weight:800;color:#06D6A0;font-size:.9rem;background:rgba(6,214,160,.1);padding:5px 12px;border-radius:7px;border:1px solid rgba(6,214,160,.2);}
.btn-select{
  background:linear-gradient(135deg,#5b7dff,#1dd1a1);border:none;
  color:#fff;padding:10px 24px;border-radius:9px;cursor:pointer;
  font-weight:800;font-size:.88rem;transition:all .2s;
  display:flex;align-items:center;gap:7px;
  box-shadow:0 4px 20px rgba(91,125,255,.35);
}
.btn-select:hover{transform:translateY(-1px);box-shadow:0 7px 28px rgba(91,125,255,.45);}

/* Loading */
#loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:calc(100vh - 60px);gap:16px;color:rgba(255,255,255,.45);
  padding-top:60px;
}
#loading .spin{
  width:44px;height:44px;border:3px solid rgba(255,255,255,.1);
  border-top-color:#5b7dff;border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Preview site wrapper */
#preview-site{
  padding-top:60px;
}

/* ── SITE COMPONENTS ── */
.site-nav{
  height:68px;display:flex;align-items:center;justify-content:space-between;
  padding:0 52px;position:sticky;top:60px;z-index:10;
  backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.06);
}
.nav-logo{font-weight:900;font-size:1.2rem;letter-spacing:-.02em;}
.nav-links{display:flex;align-items:center;gap:26px;}
.nav-links span{font-size:.875rem;font-weight:500;cursor:pointer;opacity:.65;transition:opacity .15s;}
.nav-links span:hover{opacity:1;}
.nav-cta{display:flex;align-items:center;gap:10px;}
.btn-nav-outline{padding:7px 18px;border-radius:8px;font-size:.82rem;font-weight:600;border:1.5px solid rgba(255,255,255,.18);color:rgba(255,255,255,.75);cursor:pointer;background:none;transition:all .15s;}
.btn-nav-outline:hover{border-color:rgba(255,255,255,.35);color:#fff;background:rgba(255,255,255,.04);}
.btn-nav-primary{padding:8px 20px;border-radius:8px;font-size:.82rem;font-weight:700;border:none;color:#fff;cursor:pointer;transition:all .18s;}
.btn-nav-primary:hover{opacity:.88;transform:translateY(-1px);}

.site-hero{
  min-height:90vh;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:80px 44px 60px;position:relative;overflow:hidden;
}
.hero-orb{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none;}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 18px;border-radius:99px;font-size:.76rem;font-weight:700;
  margin-bottom:22px;border:1px solid;backdrop-filter:blur(8px);letter-spacing:.02em;
}
.hero-h1{
  font-size:clamp(2.2rem,5.5vw,3.8rem);font-weight:900;
  line-height:1.1;letter-spacing:-.03em;margin-bottom:18px;
}
.hero-p{font-size:1.05rem;opacity:.6;max-width:520px;margin:0 auto 36px;line-height:1.75;}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.btn-hero-p{
  padding:14px 36px;border-radius:12px;font-weight:800;font-size:.95rem;
  color:#fff;border:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;
  box-shadow:0 8px 28px rgba(0,0,0,.3);transition:all .18s;
}
.btn-hero-p:hover{transform:translateY(-2px);box-shadow:0 14px 36px rgba(0,0,0,.4);}
.btn-hero-o{
  padding:14px 36px;border-radius:12px;font-weight:600;font-size:.95rem;
  color:rgba(255,255,255,.85);border:2px solid rgba(255,255,255,.15);
  cursor:pointer;background:none;
  display:inline-flex;align-items:center;gap:8px;
  backdrop-filter:blur(8px);transition:all .18s;
}
.btn-hero-o:hover{border-color:rgba(255,255,255,.35);color:#fff;background:rgba(255,255,255,.05);}

.stats-band{padding:52px 44px;border-top:1px solid rgba(255,255,255,.05);border-bottom:1px solid rgba(255,255,255,.05);}
.stats-inner{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;text-align:center;max-width:700px;margin:0 auto;}
.stat-num{font-size:2.2rem;font-weight:900;line-height:1;margin-bottom:4px;}
.stat-lbl{font-size:.8rem;opacity:.45;font-weight:500;}

.site-section{padding:72px 44px;max-width:1120px;margin:0 auto;}
.section-head{text-align:center;margin-bottom:44px;}
.section-ey{display:inline-block;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;padding:4px 14px;border-radius:99px;margin-bottom:12px;border:1px solid;}
.section-head h2{font-size:clamp(1.55rem,2.8vw,2.1rem);font-weight:900;letter-spacing:-.025em;margin-bottom:8px;}
.section-head p{font-size:.92rem;opacity:.5;max-width:440px;margin:0 auto;}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;}
.site-card{
  border-radius:16px;overflow:hidden;
  border:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(10px);
  transition:transform .2s,box-shadow .2s,border-color .2s;
}
.site-card:hover{transform:translateY(-5px);box-shadow:0 18px 48px rgba(0,0,0,.4);border-color:rgba(255,255,255,.13);}
.card-thumb{
  height:140px;display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;position:relative;overflow:hidden;
}
.card-badge{display:inline-block;font-size:.63rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:4px;margin-bottom:7px;border:1px solid;}
.card-title{font-weight:700;font-size:.9rem;margin-bottom:5px;line-height:1.35;}
.card-meta{font-size:.74rem;opacity:.45;margin-bottom:13px;display:flex;align-items:center;gap:10px;}
.card-meta i{font-size:.68rem;}
.card-footer{display:flex;justify-content:space-between;align-items:center;}
.card-price{font-weight:900;font-size:1rem;}
.btn-card{padding:6px 15px;border-radius:8px;font-size:.78rem;font-weight:700;color:#fff;border:none;cursor:pointer;transition:opacity .15s;display:inline-flex;align-items:center;gap:5px;}

.features-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:18px;}
.feat-card{padding:22px;border-radius:14px;border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(10px);transition:transform .2s,border-color .2s;}
.feat-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.13);}
.feat-icon{width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:13px;}
.feat-title{font-weight:700;font-size:.88rem;margin-bottom:5px;}
.feat-desc{font-size:.78rem;opacity:.5;line-height:1.6;}

.cta-band{margin:0 40px 72px;border-radius:20px;padding:60px 40px;text-align:center;position:relative;overflow:hidden;}
.cta-band h2{font-size:clamp(1.5rem,3vw,2rem);font-weight:900;margin-bottom:10px;}
.cta-band p{font-size:.95rem;opacity:.65;margin-bottom:28px;}

.site-footer{border-top:1px solid rgba(255,255,255,.06);padding:28px 52px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.footer-logo{font-weight:800;font-size:1rem;}
.footer-links{display:flex;gap:18px;}
.footer-links span{font-size:.8rem;opacity:.4;cursor:pointer;transition:opacity .15s;}
.footer-links span:hover{opacity:.7;}
</style>
</head>
<body>

<div class="prev-nav">
  <div class="prev-left">
    <button class="btn-back" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
    <span class="prev-title" id="prev-name"></span>
    <span class="prev-badge"><i class="fas fa-eye"></i> PREVIEW</span>
  </div>
  <div class="prev-right">
    <span id="prev-price"></span>
    <button class="btn-select" id="select-btn" onclick="selectTemplate()">
      <i class="fas fa-check"></i> Select This Template
    </button>
  </div>
</div>

<div id="loading">
  <div class="spin"></div>
  <div>Building preview...</div>
</div>

<div id="preview-site" style="display:none;"></div>

<script>
var tplData = null;

async function init() {
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  var raw = params.get('t');

  // Option A: full template JSON in URL
  if (raw) {
    try { tplData = JSON.parse(decodeURIComponent(raw)); render(); return; } catch(e) {}
  }

  if (!id) { showError('No template ID provided.'); return; }

  try {
    var endpoints = ['/api/super-admin/templates-public', '/api/public/templates', '/api/templates', '/api/pagebuilder/templates'];
    var templates = null;

    for (var i = 0; i < endpoints.length; i++) {
      try {
        var token = localStorage.getItem('ep_token');
        var headers = token ? {'Authorization':'Bearer '+token,'Content-Type':'application/json'} : {};
        var r = await fetch(endpoints[i], {headers});
        if (!r.ok) continue;
        var d = await r.json();
        // Handle both array and {templates:[]} wrapper
        var list = Array.isArray(d) ? d : (d.templates || d.data || []);
        if (list.length > 0) { templates = list; break; }
      } catch(e) { continue; }
    }

    if (!templates) { showError('Could not reach server. Please try again.'); return; }

    for (var j = 0; j < templates.length; j++) {
      if (String(templates[j].id) === String(id)) { tplData = templates[j]; break; }
    }

    if (!tplData) { showError('Template #' + id + ' not found.'); return; }
    render();

  } catch(e) {
    showError('Error loading template: ' + e.message);
  }
}

function showError(msg) {
  document.getElementById('loading').innerHTML =
    '<div style="font-size:2.5rem;margin-bottom:12px;"><i class="fas fa-exclamation-triangle" style="color:rgba(239,68,68,.6);"></i></div>' +
    '<div style="color:rgba(255,255,255,.5);font-size:.95rem;">' + msg + '</div>' +
    '<a href="/home" style="color:#818CF8;margin-top:12px;font-size:.85rem;display:flex;align-items:center;gap:6px;"><i class="fas fa-arrow-left"></i> Back to templates</a>';
}

function render() {
  if (!tplData) return;

  // ── Extract template design tokens ──
  // Support both top-level fields and nested template_data
  var td = {};
  if (tplData.template_data) {
    try { td = typeof tplData.template_data === 'string' ? JSON.parse(tplData.template_data) : (tplData.template_data || {}); } catch(e) {}
  }

  var p    = td.primary  || tplData.primary_color  || '#5b7dff';
  var a    = td.accent   || tplData.accent_color   || '#1dd1a1';
  var bg   = td.bg       || tplData.bg_color       || '#0f172a';
  var font = td.font     || tplData.font_family    || 'DM Sans';
  var name = td.school_name || tplData.school_name || 'Your School Name';
  var heroTitle    = td.hero_title    || tplData.hero_title    || 'Quality Education<br/>for Every Student';
  var heroSubtitle = td.hero_subtitle || tplData.hero_subtitle || 'Courses, past questions, and live classes — all in one place.';
  var isDark = td.dark !== undefined ? td.dark : true;

  // Compute text color and glass effects
  var textColor  = isDark ? '#fff' : '#0f172a';
  var textMuted  = isDark ? 'rgba(255,255,255,0.55)' : '#475569';
  var cardBg     = isDark ? 'rgba(255,255,255,0.045)' : '#fff';
  var cardBorder = isDark ? 'rgba(255,255,255,0.07)' : '#e2e8f0';

  // ── Update navbar ──
  document.getElementById('prev-name').textContent = tplData.name || 'Template';
  var price = tplData.is_premium && Number(tplData.price || 0) > 0;
  document.getElementById('prev-price').innerHTML = price
    ? '<span style="color:#fff;font-weight:900;font-size:1.05rem;">₦' + Number(tplData.price).toLocaleString() + '</span>'
    : '<span class="prev-free"><i class="fas fa-gift" style="margin-right:5px;"></i>FREE</span>';

  // Update page bg
  document.body.style.background = bg;
  document.title = 'Preview: ' + (tplData.name || 'Template') + ' — ExamPro';

  var gradStyle = 'background:linear-gradient(135deg,' + p + ',' + a + ');';
  var pHex = p;

  // Sample data (reflects template's unique identity via colors/fonts)
  var subjects = ['Mathematics', 'English Language', 'Biology', 'Physics'];
  var icons    = ['fa-square-root-variable','fa-language','fa-dna','fa-atom'];

  var courseCards = subjects.map(function(s, i) {
    return '<div class="site-card" style="background:' + cardBg + ';border-color:' + cardBorder + ';cursor:default;">' +
      '<div class="card-thumb" style="background:linear-gradient(135deg,' + p + '22,' + a + '14);">' +
        '<i class="fas ' + icons[i] + '" style="font-size:2.2rem;color:' + p + ';opacity:.7;"></i>' +
      '</div>' +
      '<div style="padding:16px 16px 14px;">' +
        '<div class="card-badge" style="background:' + p + '14;color:' + p + ';border-color:' + p + '30;">' + (i < 2 ? 'Core' : 'Science') + '</div>' +
        '<div class="card-title" style="color:' + textColor + ';">' + s + '</div>' +
        '<div class="card-meta" style="color:' + textMuted + ';"><span><i class="fas fa-layer-group"></i> 24 lessons</span><span><i class="fas fa-certificate"></i> Certificate</span></div>' +
        '<div class="card-footer">' +
          '<span class="card-price" style="color:' + a + ';">₦' + [3500,2800,4200,3100][i].toLocaleString() + '</span>' +
          '<button class="btn-card" style="background:' + p + ';"><i class="fas fa-shopping-cart"></i> Enroll</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var pqCards = [
    {s:'WAEC Mathematics', y:'2023', e:'WAEC'},
    {s:'JAMB Biology', y:'2023', e:'JAMB'},
    {s:'NECO Physics', y:'2022', e:'NECO'},
  ].map(function(q) {
    return '<div class="site-card" style="background:' + cardBg + ';border-color:' + a + '18;cursor:default;">' +
      '<div class="card-thumb" style="background:linear-gradient(135deg,' + a + '20,' + p + '10);">' +
        '<i class="fas fa-file-pdf" style="font-size:2.2rem;color:' + a + ';opacity:.7;"></i>' +
      '</div>' +
      '<div style="padding:16px 16px 14px;">' +
        '<div class="card-badge" style="background:' + a + '14;color:' + a + ';border-color:' + a + '30;">' + q.e + '</div>' +
        '<div class="card-title" style="color:' + textColor + ';">' + q.s + '</div>' +
        '<div class="card-meta" style="color:' + textMuted + ';"><span><i class="fas fa-calendar"></i> ' + q.y + '</span><span><i class="fas fa-file-pdf"></i> PDF</span></div>' +
        '<div class="card-footer">' +
          '<span class="card-price" style="color:' + a + ';">₦500</span>' +
          '<button class="btn-card" style="background:' + a + ';"><i class="fas fa-shopping-cart"></i> Buy</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  var featureCards = [
    {icon:'fa-video',title:'HD Video Lessons',desc:'High-quality lectures from expert instructors'},
    {icon:'fa-file-alt',title:'Past Questions',desc:'WAEC, JAMB, NECO, and more'},
    {icon:'fa-certificate',title:'Certificates',desc:'Earn verified certificates on completion'},
    {icon:'fa-broadcast-tower',title:'Live Classes',desc:'Real-time interactive sessions'},
  ].map(function(f, i) {
    var c = i % 2 === 0 ? p : a;
    return '<div class="feat-card" style="background:' + c + '06;border-color:' + c + '14;">' +
      '<div class="feat-icon" style="background:' + c + '18;color:' + c + ';"><i class="fas ' + f.icon + '"></i></div>' +
      '<div class="feat-title" style="color:' + textColor + ';">' + f.title + '</div>' +
      '<div class="feat-desc">' + f.desc + '</div>' +
    '</div>';
  }).join('');

  document.getElementById('preview-site').innerHTML =
    // NAV
    '<nav class="site-nav" style="background:' + bg + 'dd;">' +
      '<div class="nav-logo" style="' + gradStyle + '-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">' + name + '</div>' +
      '<div class="nav-links">' +
        '<span style="color:' + textMuted + ';"><i class="fas fa-play-circle" style="margin-right:4px;font-size:.78rem;"></i>Courses</span>' +
        '<span style="color:' + textMuted + ';"><i class="fas fa-file-alt" style="margin-right:4px;font-size:.78rem;"></i>Past Questions</span>' +
        '<span style="color:' + textMuted + ';"><i class="fas fa-info-circle" style="margin-right:4px;font-size:.78rem;"></i>About</span>' +
      '</div>' +
      '<div class="nav-cta">' +
        '<button class="btn-nav-outline">Login</button>' +
        '<button class="btn-nav-primary" style="' + gradStyle + '"><i class="fas fa-user-plus" style="margin-right:6px;"></i>Register</button>' +
      '</div>' +
    '</nav>' +

    // HERO
    '<div class="site-hero" style="background:' + bg + ';">' +
      '<div class="hero-orb" style="width:550px;height:550px;background:' + p + ';opacity:.1;top:-120px;left:-80px;"></div>' +
      '<div class="hero-orb" style="width:380px;height:380px;background:' + a + ';opacity:.08;bottom:-60px;right:-60px;"></div>' +
      '<div style="position:relative;z-index:1;max-width:660px;">' +
        '<div class="hero-eyebrow" style="background:' + p + '18;border-color:' + p + '44;color:' + p + ';">' +
          '<i class="fas fa-graduation-cap"></i> ' + name +
        '</div>' +
        '<h1 class="hero-h1" style="color:' + textColor + ';">' + heroTitle.replace(/<br\/?>/g,'<br/>') + '</h1>' +
        '<p class="hero-p">' + heroSubtitle + '</p>' +
        '<div class="hero-btns">' +
          '<button class="btn-hero-p" style="' + gradStyle + '"><i class="fas fa-rocket"></i> Get Started Free</button>' +
          '<button class="btn-hero-o"><i class="fas fa-book-open"></i> Browse Courses</button>' +
        '</div>' +
      '</div>' +
    '</div>' +

    // STATS
    '<div class="stats-band" style="background:' + p + '0c;border-color:' + p + '18;">' +
      '<div class="stats-inner">' +
        '<div><div class="stat-num" style="color:' + p + ';">500+</div><div class="stat-lbl"><i class="fas fa-users" style="margin-right:4px;font-size:.72rem;"></i>Students</div></div>' +
        '<div><div class="stat-num" style="color:' + a + ';">50+</div><div class="stat-lbl"><i class="fas fa-play-circle" style="margin-right:4px;font-size:.72rem;"></i>Courses</div></div>' +
        '<div><div class="stat-num" style="color:' + p + ';">20+</div><div class="stat-lbl"><i class="fas fa-chalkboard-teacher" style="margin-right:4px;font-size:.72rem;"></i>Instructors</div></div>' +
        '<div><div class="stat-num" style="color:' + a + ';">98%</div><div class="stat-lbl"><i class="fas fa-chart-line" style="margin-right:4px;font-size:.72rem;"></i>Pass Rate</div></div>' +
      '</div>' +
    '</div>' +

    // COURSES
    '<div class="site-section">' +
      '<div class="section-head">' +
        '<div class="section-ey" style="background:' + p + '14;border-color:' + p + '30;color:' + p + ';"><i class="fas fa-play-circle" style="margin-right:6px;"></i>Our Courses</div>' +
        '<h2 style="color:' + textColor + ';">Learn from Expert Instructors</h2>' +
        '<p>Carefully crafted to help you pass your exams</p>' +
      '</div>' +
      '<div class="cards-grid">' + courseCards + '</div>' +
    '</div>' +

    // WHY US
    '<div style="background:' + p + '07;border-top:1px solid ' + p + '10;border-bottom:1px solid ' + p + '10;padding:72px 44px;">' +
      '<div style="max-width:1120px;margin:0 auto;">' +
        '<div class="section-head">' +
          '<div class="section-ey" style="background:' + a + '14;border-color:' + a + '30;color:' + a + ';"><i class="fas fa-star" style="margin-right:6px;"></i>Why Choose Us</div>' +
          '<h2 style="color:' + textColor + ';">Everything You Need to Succeed</h2>' +
          '<p>A complete learning platform for Nigerian students</p>' +
        '</div>' +
        '<div class="features-grid">' + featureCards + '</div>' +
      '</div>' +
    '</div>' +

    // PAST QUESTIONS
    '<div class="site-section">' +
      '<div class="section-head">' +
        '<div class="section-ey" style="background:' + a + '14;border-color:' + a + '30;color:' + a + ';"><i class="fas fa-file-alt" style="margin-right:6px;"></i>Past Questions</div>' +

      '<div class="cards-grid" style="grid-template-columns:repeat(auto-fill,minmax(220px,1fr));">' + pqCards + '</div>' +
    '</div>' +

    // CTA
    '<div class="cta-band" style="background:linear-gradient(135deg,' + p + '18,' + a + '10);border:1px solid ' + p + '22;">' +

      '</div>' +
    '</div>' +

    // FOOTER
    '<footer class="site-footer" style="background:' + bg + ';">' +
      '<div>' +
        '<div class="footer-logo" style="' + gradStyle + '-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;">' + name + '</div>' +

        '<span><i class="fas fa-file-alt" style="margin-right:4px;"></i>Past Questions</span>' +
        '<span><i class="fas fa-sign-in-alt" style="margin-right:4px;"></i>Login</span>' +

    '</footer>';

  document.getElementById('loading').style.display = 'none';
  document.getElementById('preview-site').style.display = 'block';
}

function selectTemplate() {
  if (!tplData) return;
  sessionStorage.setItem('chosen_template', JSON.stringify(tplData));
  if (tplData.is_premium && Number(tplData.price || 0) > 0) {
    window.location.href = '/checkout?template=' + tplData.id;
  } else {
    window.location.href = '/register?role=admin';
  }
}

init();
