<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - ExamPro</title>
<link rel="stylesheet" href="/css/main.css">
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 60% 60% at 30% 50%,rgba(91,125,255,0.1) 0%,transparent 60%)}
.auth-card{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:440px}
.auth-logo{font-family:var(--font-head);font-size:1.8rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:8px}
.auth-subtitle{text-align:center;color:var(--text-muted);font-size:0.9rem;margin-bottom:32px}
.step{display:none}
.step.active{display:block}
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo" id="fp-school-name">EXAMPRO</div>
    <p class="auth-subtitle">Reset your password in 3 steps</p>
    <div id="alertBox"></div>

    <!-- STEP 1: Enter email -->
    <div class="step active" id="step-1">
      <p style="margin-bottom:16px;color:var(--text-muted);font-size:0.9rem;">Enter your email and we'll send you a reset code</p>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="yourname@example.com">
      </div>
      <button class="btn btn-primary" onclick="sendReset()" style="width:100%;" id="sendBtn">Send Reset Code</button>
      <p style="text-align:center;margin-top:16px;font-size:0.85rem;">
        Know your password? <a id="loginLink" href="/login" style="color:var(--primary);font-weight:600;">Login →</a>
      </p>
    </div>

    <!-- STEP 2: Enter OTP -->
    <div class="step" id="step-2">
      <p style="margin-bottom:16px;color:var(--text-muted);font-size:0.9rem;">Enter the 6-digit code sent to <span id="otpEmailDisplay" style="color:var(--text);font-weight:600;"></span></p>
      <div class="form-group">
        <label class="form-label">Verification Code</label>
        <input type="text" class="form-control" id="otp" placeholder="000000" maxlength="6" style="text-align:center;font-size:1.5rem;letter-spacing:8px;">
      </div>
      <button class="btn btn-primary" onclick="verifyReset()" style="width:100%;" id="verifyBtn">Verify Code</button>
      <button class="btn btn-outline" onclick="resendReset()" style="width:100%;margin-top:10px;">Resend Code</button>
    </div>

    <!-- STEP 3: New password -->
    <div class="step" id="step-3">
      <p style="margin-bottom:16px;color:var(--text-muted);font-size:0.9rem;">Create a new password for your account</p>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-control" id="newPass" placeholder="Enter new password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPass" placeholder="Confirm password">
      </div>
      <p style="font-size:0.8rem;color:var(--text-muted);margin-bottom:16px;">✓ At least 6 characters long</p>
      <button class="btn btn-primary" onclick="doResetPassword()" style="width:100%;" id="resetBtn">Reset Password</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
redirectIfLoggedIn();

// Only read school from URL param to avoid stale sessionStorage bleed
var schoolParam = new URLSearchParams(window.location.search).get('school');
if (schoolParam) {
  document.getElementById('loginLink').href = '/login?school=' + schoolParam;
  http.get('/institutions/public/site-by-id-subdomain/' + schoolParam).then(function(site) {
    if (site && site.school_name) {
      document.getElementById('fp-school-name').textContent = site.school_name;
      document.title = 'Forgot Password - ' + site.school_name;
    }
  }).catch(function(){});
}

var resetEmail = '';
var resetOTP = '';

function showAlert(msg, type) {
  document.getElementById('alertBox').innerHTML = '<div class="alert alert-' + (type||'error') + '" style="margin-bottom:16px;">' + msg + '</div>';
}
function clearAlert() { document.getElementById('alertBox').innerHTML = ''; }

function showStep(num) {
  document.querySelectorAll('.step').forEach(function(s){ s.classList.remove('active'); });
  var el = document.getElementById('step-' + num);
  if (el) el.classList.add('active');
  clearAlert();
}

// Step 1: Send reset OTP to email
async function sendReset() {
  var email = document.getElementById('email').value.trim();
  if (!email) return showAlert('Please enter your email');
  var btn = document.getElementById('sendBtn');
  setLoading(btn, true);
  var data = await http.post('/auth/forgot-password', { email: email, school: schoolParam || null });
  setLoading(btn, false);
  if (data && data.ok) {
    resetEmail = email;
    document.getElementById('otpEmailDisplay').textContent = email;
    Toast.success('Reset code sent to your email');
    showStep(2);
  } else {
    showAlert((data && data.message) || 'Failed to send reset code');
  }
}

// Step 2: Just store the OTP locally and proceed to step 3
// We do NOT call verify-otp here because that checks is_verified flag
// The OTP is validated in reset-password on the backend
function verifyReset() {
  var otp = document.getElementById('otp').value.trim();
  if (!otp || otp.length < 4) return showAlert('Please enter the code from your email');
  resetOTP = otp;
  Toast.success('Code accepted — enter your new password');
  showStep(3);
}

// Resend OTP
async function resendReset() {
  if (!resetEmail) return showAlert('Please enter your email first');
  var data = await http.post('/auth/forgot-password', { email: resetEmail, school: schoolParam || null });
  if (data && data.ok) Toast.success('New code sent to your email');
  else showAlert((data && data.message) || 'Failed to resend');
}

// Step 3: Submit new password with OTP — backend validates OTP here
async function doResetPassword() {
  var pwd = document.getElementById('newPass').value;
  var confirm = document.getElementById('confirmPass').value;
  if (!pwd || pwd.length < 6) return showAlert('Password must be at least 6 characters');
  if (pwd !== confirm) return showAlert('Passwords do not match');
  var btn = document.getElementById('resetBtn');
  setLoading(btn, true);
  var data = await http.post('/auth/reset-password', {
    email: resetEmail,
    otp: resetOTP,
    newPassword: pwd,
    school: schoolParam || null
  });
  setLoading(btn, false);
  if (data && data.ok) {
    Toast.success('Password reset! Redirecting to login...');
    var dest = schoolParam ? '/login?school=' + schoolParam : '/login';
    setTimeout(function(){ window.location.href = dest; }, 1500);
  } else {
    showAlert((data && data.message) || 'Invalid or expired code. Please start over.');
    // If OTP is wrong/expired, go back to step 1
    if (data && data.message && data.message.toLowerCase().includes('expired')) {
      setTimeout(function(){ showStep(1); }, 2000);
    }
  }
}
</script>
</body>
</html>
