<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate — ExamPro</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f0e2a;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px;}
  .top-bar{width:100%;max-width:820px;display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
  .top-bar a{color:rgba(255,255,255,.6);text-decoration:none;font-size:.9rem;display:flex;align-items:center;gap:6px;}
  .top-bar a:hover{color:#fff;}
  .cert-wrap{width:100%;max-width:820px;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,.5);position:relative;}
  .cert-header-band{height:10px;background:var(--pc,#5C6EF8);}
  .cert-body{padding:48px 64px;}
  .cert-platform{color:var(--pc,#5C6EF8);font-size:.8rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:8px;}
  .cert-title{font-size:2.2rem;font-weight:800;color:#1e293b;text-align:center;margin-bottom:6px;}
  .cert-divider{width:120px;height:2px;background:var(--pc,#5C6EF8);margin:16px auto;}
  .cert-subtitle{text-align:center;color:#64748b;font-size:.95rem;margin-bottom:6px;}
  .cert-name{text-align:center;font-size:2rem;font-style:italic;font-weight:700;color:#1e293b;margin:8px 0 4px;}
  .cert-name-underline{width:280px;height:2px;background:var(--pc,#5C6EF8);margin:0 auto 14px;}
  .cert-course-label{text-align:center;color:#64748b;font-size:.9rem;margin-bottom:6px;}
  .cert-course{text-align:center;font-size:1.25rem;font-weight:700;color:#1e293b;margin-bottom:8px;}
  .cert-instructor{text-align:center;font-size:.88rem;color:#64748b;margin-bottom:32px;}
  .cert-footer{display:flex;align-items:flex-end;justify-content:space-between;padding-top:20px;border-top:1px solid #e2e8f0;margin-top:8px;}
  .cert-footer-item{text-align:center;}
  .cert-footer-label{font-size:.72rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
  .cert-footer-value{font-size:.9rem;font-weight:700;color:#1e293b;}
  .cert-number{font-size:.8rem;color:var(--pc,#5C6EF8);}
  .qr-box{width:80px;height:80px;border:1px solid #e2e8f0;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .qr-box img{width:76px;height:76px;}
  .cert-footer-band{height:10px;background:var(--pc,#5C6EF8);}
  .actions{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;justify-content:center;}
  .btn{padding:11px 22px;border-radius:9px;font-weight:700;font-size:.88rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px;border:none;}
  .btn-primary{background:var(--pc,#5C6EF8);color:#fff;}
  .btn-outline{background:transparent;border:1.5px solid rgba(255,255,255,.2);color:#fff;}
  .btn-outline:hover{background:rgba(255,255,255,.07);}
  .loading{color:rgba(255,255,255,.5);text-align:center;padding:60px;font-size:1rem;}
  .error-state{color:#ef4444;text-align:center;padding:60px;}
  @media print{
    body{background:#fff;padding:0;}
    .top-bar,.actions{display:none!important;}
    .cert-wrap{box-shadow:none;border-radius:0;max-width:100%;}
  }
</style>
</head>
<body>
<div class="top-bar">
  <a href="/dashboard"><i class="fas fa-arrow-left"></i> My Dashboard</a>
  <a href="javascript:window.print()"><i class="fas fa-print"></i> Print</a>
</div>

<div id="cert-container" class="cert-wrap">
  <div class="loading"><i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Loading certificate...</div>
</div>

<div class="actions" id="cert-actions" style="display:none;">
  <a id="dl-btn" href="#" class="btn btn-primary" target="_blank"><i class="fas fa-file-pdf"></i> Download PDF</a>
  <a href="/dashboard?tab=certificates" class="btn btn-outline"><i class="fas fa-medal"></i> All Certificates</a>
</div>

<script src="/js/app.js"></script>
<script>
const certId = window.location.pathname.split('/').pop();

async function loadCert() {
  const token = Auth.getToken();
  if (!token) { window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname); return; }

  const res = await fetch('/api/student/certificates/' + certId + '/data', {
    headers: { Authorization: 'Bearer ' + token }
  });

  const container = document.getElementById('cert-container');

  if (!res.ok) {
    container.innerHTML = '<div class="error-state"><i class="fas fa-exclamation-circle" style="font-size:2rem;display:block;margin-bottom:12px;"></i>Certificate not found or you do not have access to it.</div>';
    return;
  }

  const c = await res.json();
  const pc = c.primary_color || '#5C6EF8';
  document.documentElement.style.setProperty('--pc', pc);

  const qrUrl = 'https://chart.googleapis.com/chart?chs=76x76&cht=qr&choe=UTF-8&chl=' + encodeURIComponent(window.location.origin + '/verify-certificate/' + c.certificate_number);

  container.innerHTML = `
    <div class="cert-header-band" style="background:${pc};"></div>
    <div class="cert-body">
      <div class="cert-platform">${c.platform_name || 'ExamPro'}</div>
      <div class="cert-title">Certificate of Completion</div>
      <div class="cert-divider" style="background:${pc};"></div>
      <div class="cert-subtitle">This is to certify that</div>
      <div class="cert-name">${c.student_name}</div>
      <div class="cert-name-underline" style="background:${pc};"></div>
      <div class="cert-course-label">has successfully completed the course</div>
      <div class="cert-course">${c.course_title}</div>
      ${c.instructor_name ? `<div class="cert-instructor">Instructor: <strong>${c.instructor_name}</strong></div>` : ''}
      <div class="cert-footer">
        <div class="cert-footer-item">
          <div class="cert-footer-label">Date Completed</div>
          <div class="cert-footer-value">${c.completed_date}</div>
        </div>
        <div class="cert-footer-item">
          <div class="cert-footer-label">Certificate No.</div>
          <div class="cert-number">${c.certificate_number}</div>
          <div class="cert-footer-label" style="margin-top:4px;">Issued by</div>
          <div class="cert-footer-value">${c.platform_name || 'ExamPro'}</div>
        </div>
        <div class="cert-footer-item">
          <div class="cert-footer-label" style="margin-bottom:4px;">Verify</div>
          <div class="qr-box">
            <img src="${qrUrl}" alt="QR Code" loading="lazy"/>
          </div>
        </div>
      </div>
    </div>
    <div class="cert-footer-band" style="background:${pc};"></div>`;

  document.getElementById('dl-btn').href = '/api/student/certificates/' + certId + '/pdf';
  document.getElementById('cert-actions').style.display = 'flex';
  document.title = c.course_title + ' — Certificate';
}

loadCert();
</script>
<script>
// Role-aware dashboard links
(function fixDashLinks() {
  if (typeof Auth === 'undefined') { setTimeout(fixDashLinks, 80); return; }
  var url = Auth.getDashboardUrl ? Auth.getDashboardUrl() : '/dashboard';
  document.querySelectorAll('a[href="/dashboard"]').forEach(function(a) { a.href = url; });
})();
</script>
</body>
</html>
